name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          timeout: 300s
          script: |
            cd /root/admin_repo
            git pull origin main

            # Останавливаем старые контейнеры из /root/admin если есть
            cd /root/admin
            docker compose down || true

            # Копируем docker-compose и нужные файлы
            cp /root/admin_repo/docker-compose.yml /root/admin/docker-compose.yml

            # Синхронизируем backend (кроме node_modules, uploads, .env)
            rsync -a --delete \
              --exclude='node_modules' \
              --exclude='uploads' \
              --exclude='.env' \
              --exclude='dist' \
              /root/admin_repo/backend/ /root/admin/backend/

            # Синхронизируем frontend (кроме node_modules)
            rsync -a --delete \
              --exclude='node_modules' \
              --exclude='dist' \
              /root/admin_repo/frontend/ /root/admin/frontend/

            # Пересобираем и запускаем
            cd /root/admin
            docker compose up -d --build

            echo "Deploy completed at $(date)"
