name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to telegram-panel.xyz
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIVE_SERVER_HOST }}
          username: ${{ secrets.LIVE_SERVER_USER }}
          password: ${{ secrets.LIVE_SERVER_PASSWORD }}
          script_stop: true
          timeout: 600s
          script: |
            cd /root/admin_panel_tg
            git pull origin main

            docker compose build --no-cache frontend backend
            docker compose up -d

            docker image prune -f

            echo "Deploy completed at $(date)"
